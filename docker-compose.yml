services:
  bkrc: # ← Spring Boot 서비스 추가
    build: .                                 # Dockerfile 위치
    container_name: bkrc
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    extra_hosts:
      - "host.docker.internal:host-gateway"  # ← 추가
    depends_on:
      - rabbitmq
      - redis
    networks:
      - bkrc-network
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    restart: unless-stopped
    ports:
      - "8090:8080"      # 웹 UI
      - "50000:50000"    # 에이전트 연결용
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock  # Docker in Docker
    user: root  # docker.sock 접근용
  rabbitmq:
    image: rabbitmq:4.0-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guestuser      # ← 이 값
      RABBITMQ_DEFAULT_PASS: guestuser      # ← 이 값
    networks:                                # ← 추가
      - bkrc-network
  # Prometheus — 메트릭 수집
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d' # 15일 보관
    networks:
      - bkrc-network

  # Grafana — 메트릭 시각화
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    networks:
      - bkrc-network

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    restart: always
    networks:
      - bkrc-network

networks:
  bkrc-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  redis-data:
  jenkins_home:
