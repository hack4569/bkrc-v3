global:
  scrape_interval: 15s      # 15초마다 메트릭 수집
  evaluation_interval: 15s

scrape_configs:
  # Spring Boot 메트릭 수집
  - job_name: 'bkrc'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          app: 'bkrc'
        # Mac/Windows: host.docker.internal
        # Linux: 172.17.0.1
