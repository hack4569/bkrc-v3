spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  data:
    redis:
      host: localhost
      port: 6370  # 실제 Redis 없이 테스트 → StringRedisTemplate은 Mock 처리
  kafka:
    bootstrap-servers: localhost:9092

token:
  expiration-time: 86400000
  secret: my-very-long-secret-key-1234567890123456

resilience4j:
  ratelimiter:
    instances:
      aladin:
        limitForPeriod: 1000
        limitRefreshPeriod: 30s
        timeoutDuration: 5s